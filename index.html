                    </a>

            }).join('')
        };
        
        const renderRankings=(ranking)=>{
            if(!ranking || !ranking.length) return;
            const container=document.getElementById('rankings-container');
            container.innerHTML=ranking.map(entry=>{const isLive=liveRooms.includes(Number(entry.room.room_id));

        };
